<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" role="img" aria-label="Aureum · Pathway to MD">
  <defs>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161a34"/>
      <stop offset="1" stop-color="#0a0c18"/>
    </linearGradient>
    <linearGradient id="lg-spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f4c95d"/>
    </linearGradient>
    <linearGradient id="lg-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7e9f5"/>
    </linearGradient>
  </defs>

  <!-- self-contained dark plane so the lockup reads on any background -->
  <rect x="0" y="0" width="900" height="260" rx="42" fill="#0a0c18"/>
  <rect x="0.5" y="0.5" width="899" height="259" rx="41.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- mark -->
  <g transform="translate(40 46) scale(0.328)">
    <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#lg-bg)"/>
    <rect x="16.5" y="16.5" width="479" height="479" rx="115.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
    <path d="M256 96 C 268 176, 336 244, 416 256 C 336 268, 268 336, 256 416 C 244 336, 176 268, 96 256 C 176 244, 244 176, 256 96 Z" fill="url(#lg-spark)"/>
    <path d="M372 138 C 376 158, 390 172, 410 176 C 390 180, 376 194, 372 214 C 368 194, 354 180, 334 176 C 354 172, 368 158, 372 138 Z" fill="#f4c95d" opacity="0.9"/>
    <circle cx="150" cy="360" r="12" fill="#f4c95d"/>
  </g>

  <!-- wordmark -->
  <text x="238" y="140" font-family="Fraunces, Georgia, serif" font-weight="700" font-size="96" letter-spacing="6" fill="url(#lg-word)">AUREUM</text>
  <text x="242" y="188" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="30" letter-spacing="14" fill="#f4c95d">PATHWAY TO MD</text>
</svg>
